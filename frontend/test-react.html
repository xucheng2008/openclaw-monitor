<!DOCTYPE html>
<html>
<head>
  <title>React Test</title>
</head>
<body>
  <div id="root"></div>
  <script type="module">
    import React from 'https://esm.sh/react@18.2.0';
    import ReactDOM from 'https://esm.sh/react-dom@18.2.0/client';
    
    function TestApp() {
      return React.createElement('div', { style: { padding: 20, color: '#fff' } },
        React.createElement('h1', null, '✅ React 工作正常！'),
        React.createElement('p', null, '如果你看到这个，说明 React 可以正常渲染')
      );
    }
    
    ReactDOM.createRoot(document.getElementById('root')).render(
      React.createElement(TestApp)
    );
  </script>
</body>
</html>
